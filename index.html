    <!-- Fixed favicon path to remove the old subfolder -->
    <link rel="icon" type="image/png" href="/blogo.png" />

    <!-- SPA Single Page Application Routing Redirect Script -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.lastIndexOf('/')) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    
    <!-- Note: Removed cdn.tailwindcss.com script tag. See step below to ensure Tailwind functions correctly via Vite. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
